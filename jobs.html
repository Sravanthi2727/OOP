<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jobs - VisionVault</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="starry-background">
        <div class="stars-layer-1"></div>
        <div class="stars-layer-2"></div>
        <div class="stars-layer-3"></div>
    </div>

    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-content">
                <a href="#" class="logo">VISIONVAULT</a>
                
                <div class="nav-links" id="navLinks">
                    <a href="courses.html" class="nav-link">Courses</a>
                    <a href="jobs.html" class="nav-link active">Jobs</a>
                    <a href="" class="nav-link">Hackathons</a>
                    <a href="quiz.html" class="nav-link">Quiz</a>
                    <button class="btn btn-outline btn-login">Login</button>
                </div>

                <button class="mobile-menu-btn" id="mobileMenuBtn">
                    <span class="hamburger"></span>
                </button>
            </div>

            <div class="mobile-menu" id="mobileMenu">
                <a href="courses.html" class="mobile-link">Courses</a>
                <a href="jobs.html" class="mobile-link">Jobs</a>
                <a href="" class="mobile-link">Hackathons</a>
                <a href="quiz.html" class="mobile-link">Quiz</a>
                <button class="btn btn-outline btn-login">Login</button>
            </div>
        </div>
    </nav>

    <main class="page-content">
        <div class="container">
            <div class="page-header">
                <h1 class="page-title">Job <span class="text-primary">Opportunities</span></h1>
                <p class="page-description">Find your next career move with top tech companies hiring now.</p>
            </div>

            <div class="search-container">
                <div class="search-box">
                    <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.35-4.35"></path>
                    </svg>
                    <input type="search" class="search-input" id="jobSearch" placeholder="Search jobs...">
                </div>
            </div>

            <div class="job-grid" id="jobGrid">
                <div class="job-card" data-job-title="Sample Job" data-company="Sample Company">
                    <div class="card-header">
                        <div class="card-title-section">
                            <h3 class="card-title">[Job Title]</h3>
                            <p class="card-subtitle">[Company Name]</p>
                        </div>
                        <svg class="card-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect>
                            <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path>
                        </svg>
                    </div>
                    <div class="card-content">
                        <div class="job-details">
                            <div class="detail-item">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                                    <circle cx="12" cy="10" r="3"></circle>
                                </svg>
                                <span>[Location]</span>
                            </div>
                            <div class="detail-item">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <line x1="12" y1="1" x2="12" y2="23"></line>
                                    <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
                                </svg>
                                <span>[Salary Range]</span>
                            </div>
                            <div class="detail-item">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                                    <line x1="16" y1="2" x2="16" y2="6"></line>
                                    <line x1="8" y1="2" x2="8" y2="6"></line>
                                    <line x1="3" y1="10" x2="21" y2="10"></line>
                                </svg>
                                <span>Posted [Date]</span>
                            </div>
                        </div>
                        <span class="badge badge-primary">[Job Type]</span>
                        <button class="btn btn-primary btn-full">Apply Now</button>
                    </div>
                </div>

                </div>

            <div class="no-results" id="noResults" style="display: none;">
                <p>No jobs found matching your search.</p>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>

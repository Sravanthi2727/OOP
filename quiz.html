<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz - VisionVault</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="starry-background">
        <div class="stars-layer-1"></div>
        <div class="stars-layer-2"></div>
        <div class="stars-layer-3"></div>
    </div>

    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-content">
                <a href="#" class="logo">VISIONVAULT</a>
                
                <div class="nav-links" id="navLinks">
                    <a href="courses.html" class="nav-link">Courses</a>
                    <a href="jobs.html" class="nav-link">Jobs</a>
                    <a href="" class="nav-link">Hackathons</a>
                    <a href="quiz.html" class="nav-link active">Quiz</a>
                    <button class="btn btn-outline btn-login">Login</button>
                </div>

                <button class="mobile-menu-btn" id="mobileMenuBtn">
                    <span class="hamburger"></span>
                </button>
            </div>

            <div class="mobile-menu" id="mobileMenu">
                <a href="courses.html" class="mobile-link">Courses</a>
                <a href="jobs.html" class="mobile-link">Jobs</a>
                <a href="" class="mobile-link">Hackathons</a>
                <a href="quiz.html" class="mobile-link">Quiz</a>
                <button class="btn btn-outline btn-login">Login</button>
            </div>
        </div>
    </nav>

    <main class="page-content">
        <div class="container">
            <div class="page-header">
                <h1 class="page-title">Test Your <span class="text-primary">Knowledge</span></h1>
                <p class="page-description">Challenge yourself with interactive quizzes across various tech topics and track your progress.</p>
            </div>

            <div class="quiz-grid" id="quizCategories">
                <div class="quiz-category-card">
                    <div class="quiz-icon-wrapper badge-yellow">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="16 18 22 12 16 6"></polyline>
                            <polyline points="8 6 2 12 8 18"></polyline>
                        </svg>
                    </div>
                    <h3 class="quiz-category-title">[Category Name]</h3>
                    <p class="quiz-category-meta">[X] questions • [Y] minutes</p>
                    <button class="btn btn-outline btn-full">Start Quiz</button>
                </div>

                </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
